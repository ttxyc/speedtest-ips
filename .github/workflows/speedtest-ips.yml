name: 🚀 CDN IP Speed Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🧪 Parse speed data and get fastest IPs
        run: node .github/workflows/speedtest.js

      - name: 📤 Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fastest-ips.txt fastest-ips.json || true
          git diff --staged --quiet || git commit -m "Update fastest IPs [skip ci]"
          git push
